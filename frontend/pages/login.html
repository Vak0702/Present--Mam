<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Present Mam - Login</title>

    <link rel="stylesheet" href="../css/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left-panel">

            <div class="logo-box">
                <i class="fa-solid fa-user-check"></i>
            </div>

            <h1>
                Present Mam
            </h1>

            <p class="subtitle">
                Smart Attendance Management Platform
            </p>

            <div class="features">

                <div class="feature-card">
                    <i class="fa-solid fa-camera"></i>
                    <div>
                        <h4>AI Attendance</h4>
                        <p>Future-ready face recognition attendance.</p>
                    </div>
                </div>

                <div class="feature-card">
                    <i class="fa-solid fa-chart-column"></i>
                    <div>
                        <h4>Reports</h4>
                        <p>Track attendance with analytics.</p>
                    </div>
                </div>

                <div class="feature-card">
                    <i class="fa-solid fa-shield-halved"></i>
                    <div>
                        <h4>Secure Records</h4>
                        <p>Protected student data.</p>
                    </div>
                </div>

                <div class="feature-card">
                    <i class="fa-solid fa-cloud"></i>
                    <div>
                        <h4>Cloud Access</h4>
                        <p>Available anytime, anywhere.</p>
                    </div>
                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="right-panel">

            <div class="login-card">

                <h2>Welcome Back 👋</h2>

                <p class="login-text">
                    Login to your account
                </p>

                <div class="role-selector">
                    <div class="slider"></div>
                    <button type="button" class="role-btn active" id="studentBtn">
                        <i class="fa-solid fa-user-graduate"></i>
                        Student
                    </button>

                    <button type="button" class="role-btn" id="teacherBtn">
                        <i class="fa-solid fa-chalkboard-user"></i>
                        Teacher
                    </button>
                </div>

                <form id="loginForm">

                    <div class="input-group">
                        <i class="fa-solid fa-id-card" id="identifierIcon"></i>
                        <input type="email" id="identifier" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password">
                    </div>

                    <div class="options">

                        <label>
                            <input type="checkbox">
                            Remember Me
                        </label>

                        <a href="#">Forgot Password?</a>

                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        Login as Student
                    </button>

                </form>

            </div>

        </div>

    </div>


    <script src="../js/login.js"></script>
</body>

</html>
